name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_os: linux
            asset_arch: amd64
            ext: ""
          - os: macos-15-intel
            target: x86_64-apple-darwin
            asset_os: darwin
            asset_arch: amd64
            ext: ""
          - os: macos-15
            target: aarch64-apple-darwin
            asset_os: darwin
            asset_arch: arm64
            ext: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_os: windows
            asset_arch: amd64
            ext: ".exe"

    runs-on: ${{ matrix.os }}
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        shell: bash
        run: |
          set -euo pipefail
          cargo build --locked --release --target "${{ matrix.target }}"
          mkdir -p dist
          tag="${GITHUB_REF_NAME}"
          asset="deadcore_${tag}_${{ matrix.asset_os }}_${{ matrix.asset_arch }}${{ matrix.ext }}"
          cp "target/${{ matrix.target }}/release/deadcore${{ matrix.ext }}" "dist/${asset}"

      - name: Smoke release artifact
        shell: bash
        run: |
          set -euo pipefail
          asset="deadcore_${GITHUB_REF_NAME}_${{ matrix.asset_os }}_${{ matrix.asset_arch }}${{ matrix.ext }}"
          smoke_dir="${RUNNER_TEMP}/deadcore-smoke-${{ matrix.asset_os }}-${{ matrix.asset_arch }}"
          request_path="test/fixtures/contracts/deadcode/controller-basic.json"
          output_path="${smoke_dir}/analysis.json"

          rm -rf "${smoke_dir}"
          mkdir -p "${smoke_dir}"

          "dist/${asset}" --request "${request_path}" --out "${output_path}"

          python - <<'PY' "${output_path}"
          import json
          import pathlib
          import sys

          payload = json.loads(pathlib.Path(sys.argv[1]).read_text())

          if payload.get("contractVersion") != "deadcode.analysis.v1":
              raise SystemExit("release smoke did not emit deadcode.analysis.v1")

          if "findings" not in payload or "removalPlan" not in payload:
              raise SystemExit("release smoke output is missing deadcode analysis fields")
          PY

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: deadcore-${{ matrix.asset_os }}-${{ matrix.asset_arch }}
          path: dist/*

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Build checksums
        shell: bash
        run: |
          set -euo pipefail
          (cd dist && sha256sum * > checksums.txt)

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*
